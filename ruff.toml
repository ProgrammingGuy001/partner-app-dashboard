# Ruff configuration for partner-app-dashboard FastAPI backend
[lint]
select = ["E", "W", "F", "B"]

ignore = [
    # E501: line too long — handled by formatter, not enforced at lint time
    "E501",
    # E712: comparison to True/False — SQLAlchemy ORM filter expressions
    #       intentionally use `== True` / `== False` to emit SQL predicates
    "E712",
    # B008: function-call-in-default-argument — FastAPI's Depends() pattern
    "B008",
]

[lint.per-file-ignores]
# Forward-reference string annotations in SQLAlchemy models are intentional
"app/model/*.py" = ["F821"]
# Re-export modules in __init__.py are intentional
"app/model/__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
